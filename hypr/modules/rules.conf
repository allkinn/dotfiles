##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Fix popup/dialog float otomatis
hl.window_rule({ match = { title = ".*Confirm.*" }, float = true, center = true })
hl.window_rule({ match = { title = ".*Dialog.*" }, float = true, center = true })
hl.window_rule({ match = { class = "xdg-desktop-portal-gtk" }, float = true, center = true })

# Idle inhibit saat fullscreen
hl.window_rule({ match = { fullscreen = true }, idleinhibit = "fullscreen" })

# Steam fixes
hl.window_rule({ match = { class = "steam", title = "negative:Steam" }, float = true })
hl.window_rule({ match = { class = "gamescope" }, immediate = true })

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

